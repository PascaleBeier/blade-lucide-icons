name: Update Icons

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

permissions:
  contents: write

jobs:
  check_versions:
    runs-on: ubuntu-latest
    outputs:
      current: ${{ steps.current-version.outputs.CURRENT_VERSION }}
      latest: ${{ steps.latest-version.outputs.LATEST_VERSION }}
      up_to_date: ${{ steps.current-version.outputs.CURRENT_VERSION == steps.latest-version.outputs.LATEST_VERSION }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT }}
          submodules: recursive

      - name: Set current version
        id: current-version
        run: |
          echo "CURRENT_VERSION=$(cd lucide && git describe --tags)" >> "$GITHUB_OUTPUT"
          echo "CURRENT_VERSION=$(cd lucide && git describe --tags)" >> "$GITHUB_STEP_SUMMARY"


      - name: Set latest version
        id: latest-version
        run: |
          echo "LATEST_VERSION=$(gh api repos/lucide-icons/lucide/releases/latest |  jq -r '.tag_name')" >> "$GITHUB_OUTPUT"
          echo "LATEST_VERSION=$(gh api repos/lucide-icons/lucide/releases/latest |  jq -r '.tag_name')" >> "$GITHUB_STEP_SUMMARY"
        env:
          GITHUB_TOKEN: ${{ secrets.PAT }}
  update_icons:
    needs:
      - check_versions
    runs-on: ubuntu-latest
    if: ${{ needs.check_versions.outputs.up_to_date == 'false' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.PAT }}
          submodules: recursive

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: dom, curl, libxml, mbstring, zip
          coverage: none

      - name: Install dependencies
        run: |
          composer require illuminate/contracts "^13.0" --prefer-dist --no-interaction --no-update
          composer update --prefer-dist --no-interaction --no-progress

      - name: Snapshot current icons
        run: |
          mkdir -p "$RUNNER_TEMP/icons-before"
          cp -R resources/svg/. "$RUNNER_TEMP/icons-before"/

      - name: Update Submodule
        run: |
          cd lucide
          git fetch --all --tags
          git checkout ${{ needs.check_versions.outputs.latest }}

      - name: Run Generator
        run: php vendor/bin/blade-icons-generate

      - name: Refresh Snapshots and Run Tests
        run: vendor/bin/phpunit
        
      - name: Restore original composer.json
        run: |
          composer remove illuminate/contracts --no-interaction

      - name: Classify icon changes
        id: classify
        run: |
          php bin/classify-lucide-update.php \
            --before="$RUNNER_TEMP/icons-before" \
            --after="resources/svg" \
            --current-version="${{ needs.check_versions.outputs.current }}" \
            --latest-version="${{ needs.check_versions.outputs.latest }}" \
            --message-file="$RUNNER_TEMP/lucide-update-commit-message.txt" \
            --github-output="$GITHUB_OUTPUT" >> "$GITHUB_STEP_SUMMARY"

      - name: Commit and push changes
        if: ${{ steps.classify.outputs.has_changes == 'true' }}
        uses: EndBug/add-and-commit@v10
        with:
          add: lucide resources/svg tests/__snapshots__
          message: ${{ steps.classify.outputs.commit_message }}
